<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #84fab0, #8fd3f4);
}

h1 {
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
}

/* BUTTON UPGRADE */
button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: linear-gradient(45deg,#28a745,#20c997);
    color: #fff;
    border: none;
    border-radius: 25px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.info {
    text-align: center;
    margin-top: 20px;
}

/* WHATSAPP BUTTON */
.whatsapp {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background: #25D366;
    color: #fff;
    border-radius: 20px;
    text-decoration: none;
    transition: 0.3s;
}

.whatsapp:hover {
    transform: scale(1.05);
}
</style>

</head>

<body>

<h1>Contact Us</h1>

<div class="container">

    <!-- FORM -->
    <form onsubmit="sendToWhatsApp(); return false;">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" pattern="[0-9]{10}" required>
        <input type="text" id="address" placeholder="Address" required>
        <textarea id="message" rows="4" placeholder="Your Message"></textarea>
        <button type="submit">Send Message</button>
    </form>

    <div class="info">
        <p>📍 KS Digital Studio</p>
        <p>📞 +91 6374613428</p>

        <a href="https://wa.me/916374613428" class="whatsapp" target="_blank">
            Chat on WhatsApp
        </a>
    </div>

</div>

<script>
function sendToWhatsApp() {
    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var address = document.getElementById("address").value;
    var message = document.getElementById("message").value;

    var text = "Name: " + name + "\n"
             + "Phone: " + phone + "\n"
             + "Address: " + address + "\n"
             + "Message: " + message;

    var url = "https://wa.me/916374613428?text=" + encodeURIComponent(text);

    window.open(url, '_blank');

    alert("Redirecting to WhatsApp...");
}
</script>

</body>
</html>
