<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gifts Collection</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* Heading */
h1 {
    text-align: center;
    padding: 20px;
    color: #333;
}

/* Grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Card */
.card {
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* Image */
.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

/* Content */
.card-content {
    padding: 15px;
    text-align: center;
}

.card-content h3 {
    margin: 10px 0;
}

.price {
    color: #ff4d4d;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>Our Gifts Collection</h1>

<div class="gallery">

    <div class="card" onclick="order('Customized Key Chain')">
        <img src="g1.jpg">
        <div class="card-content">
            <h3>Customized Key Chain</h3>
        </div>
    </div>

    <div class="card" onclick="order('Customized Eye Frame')">
        <img src="g2.jpg">
        <div class="card-content">
            <h3>Customized Eye Frame</h3>
        </div>
    </div>

    <div class="card" onclick="order('Customized Eye Chain')">
        <img src="g3.jpg">
        <div class="card-content">
            <h3>Customized Eye Chain</h3>
        </div>
    </div>

    <div class="card" onclick="order('Customized Photo Card')">
        <img src="g4.jpg">
        <div class="card-content">
            <h3>Customized Photo Card</h3>
        </div>
    </div>

    <div class="card" onclick="order('Customized Mug Printing')">
        <img src="g5.jpg">
        <div class="card-content">
            <h3>Customized Mug Printing</h3>
        </div>
    </div>

    <div class="card" onclick="order('Customized Mobile Pouch')">
        <img src="g6.jpg">
        <div class="card-content">
            <h3>Customized Mobile Pouch</h3>
        </div>
    </div>

    <div class="card" onclick="order('Customized Photo Key Chain')">
        <img src="g7.jpg">
        <div class="card-content">
            <h3>Customized Photo Key Chain</h3>
        </div>
    </div>

    <div class="card" onclick="order('Customized Wallet')">
        <img src="g8.jpg">
        <div class="card-content">
            <h3>Customized Wallet</h3>
        </div>
    </div>

    <div class="card" onclick="order('Customized Water Bottle')">
        <img src="g9.jpg">
        <div class="card-content">
            <h3>Customized Water Bottle</h3>
        </div>
    </div>

</div>

<script>
function order(product) {
    var message = "Hi, I want to order: " + product;
    var url = "https://wa.me/916374613428?text=" + encodeURIComponent(message);
    window.open(url, '_blank');
}
</script>

</body>
</html>
